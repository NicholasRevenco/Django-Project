{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/BaltimoreRavens/BaltimoreRavens.css">
    <title>BaltimoreRavens</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <div class="container">
        <div>
            {{ text }}
        </div>
        <div class="row">
            {% for player in roster_key %}

            
                <div class="col-12 col-sm-6 col-md-6 col-lg-4">
                    <div class="card" style="border: none; background-color: rgb(240, 240, 240)">
                        <img class="card-img-top" src="https://a.espncdn.com/combiner/i?img=/i/headshots/nfl/players/full/3916387.png&w=350&h=254" alt="Card image">
                        <div class="card-body">
                            <h4 class="card-title">{{ text.1.2 }}</h4>
                            <p class="card-text">random text</p>
                            <a href="#" class="btn btn-dark" style="width: 100%;">See Profile</a>
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
